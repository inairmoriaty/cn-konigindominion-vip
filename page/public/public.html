<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KÖNIGIN - public</title>
  <link rel="stylesheet" href="../../style/home.css">
  <link rel="stylesheet" href="../../style/footer.css">
  <link rel="stylesheet" href="../../style/wine-menu.css">
  <link rel="stylesheet" href="../../style/mobile.css">
  <script src="../../js/wine-menu.js" defer></script>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* --- 基础设置 --- */
    html, body {
      margin: 0; 
      padding: 0;
      width: 100vw;
      min-height: 100vh;
      background: #000; 
      overflow: hidden; 
      -webkit-tap-highlight-color: transparent; 
    }

    .page-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* --- 主框架 --- */
    .app-frame {
      width: 100vw;
      height: 100vh;
      position: relative;
      margin: 0;
      overflow: hidden;
      padding-top: var(--safe-top);
      box-sizing: border-box;
    }

    /* --- 纯净背景层 --- */
    .main-bg {
      position: absolute;
      left: 0; 
      top: 0;
      width: 100%;
      height: 100%;
      background: url('../../img/public/public_bg.png') center center/cover no-repeat;
      z-index: 1; 
    }
    
    /* --- 标题层 --- */
    .title {
      position: absolute;
      top: 10%; 
      left: 50%;
      transform: translateX(-50%) scale(1.5);
      width: 120vw; 
      height: 20vw;
      max-width: 300px; 
      max-height: 80px;
      min-width: 200px; 
      min-height: 50px;
      background: url('../../img/public/title.png') center center/contain no-repeat;
      z-index: 3;
      pointer-events: none; 
    }

    /* --- 悬浮交互层容器 --- */
    .interactive-layer {
      position: absolute;
      top: 35%; 
      left: 0;
      width: 100%;
      height: auto;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap; 
      gap: 20px; 
      padding: 0 20px;
      box-sizing: border-box;
    }

    /* --- 单个酒标按钮 --- */
    .bottle-btn {
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      width: 100px; 
      height: auto;
      position: relative;
      transition: transform 0.2s ease;
    }

    .bottle-btn:active {
      transform: scale(0.92);
    }

    .bottle-btn img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      animation: floatBreathing 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
      transition: filter 0.3s ease;
    }

    /* 制造动画错落感 */
    .bottle-btn:nth-child(2) img { animation-delay: 0.8s; }
    .bottle-btn:nth-child(3) img { animation-delay: 1.6s; }
    .bottle-btn:nth-child(4) img { animation-delay: 0.4s; }
    .bottle-btn:nth-child(5) img { animation-delay: 1.2s; }

    /* 呼吸动画 */
    @keyframes floatBreathing {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); } 
    }

    /* =========================================
       新增：点开后的详情展示层 (Modal Overlay)
       ========================================= */
    .detail-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6); /* 半透明黑底 */
      backdrop-filter: blur(15px); /* 核心特效：高斯模糊底下的所有东西 */
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; /* 默认隐藏 */
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    /* 激活状态 */
    .detail-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* 详情页内部排版（左边瓶子，右边文字） */
    .detail-content {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 85%;
      max-width: 500px;
      gap: 20px;
    }

    /* 左侧大酒瓶动画：平滑推入并放大 */
    .detail-image {
      flex: 1;
      transform: translateX(-50px) scale(0.8);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .detail-overlay.active .detail-image {
      transform: translateX(0) scale(1.2); /* 放大到 1.2 倍 */
      opacity: 1;
    }
    .detail-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
    }

    /* 右侧文字与按钮动画：稍晚一点点滑入 */
    .detail-info {
      flex: 1.5;
      text-align: left;
      transform: translateX(30px);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1) 0.1s; /* 延迟 0.1s */
    }
    .detail-overlay.active .detail-info {
      transform: translateX(0);
      opacity: 1;
    }

    .detail-title {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
      font-family: serif;
    }

    .detail-desc {
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    /* 灰色互动按钮 */
    .detail-action-btn {
      display: inline-block;
      background: #4a4a4a;
      color: #fff;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .detail-action-btn:active {
      background: #333;
    }

    /* 关闭按钮 (点右上角或者空白处关闭) */
    .close-overlay {
      position: absolute;
      top: 30px;
      right: 30px;
      color: rgba(255,255,255,0.6);
      font-size: 28px;
      cursor: pointer;
      z-index: 101;
    }

  </style>
</head>
<body>
  
  <div class="page-container">
    <div class="app-frame">
      <div class="main-bg"></div>
      <div class="title"></div>

      <div class="interactive-layer">
        <button class="bottle-btn" data-id="ghost">
          <img src="../../img/public/ghost.png" alt="ghost">
        </button>

        <button class="bottle-btn" data-id="konig">
          <img src="../../img/public/konig.png" alt="konig">
        </button>

        <button class="bottle-btn" data-id="nikto">
          <img src="../../img/public/nikto.png" alt="nikto">
        </button>

        <button class="bottle-btn" data-id="keegan">
          <img src="../../img/public/keegan.png" alt="keegan">
        </button>

        <button class="bottle-btn" data-id="krueger">
          <img src="../../img/public/krueger.png" alt="krueger">
        </button>

        <button class="bottle-btn" data-id="commission">
          <img src="../../img/public/commission.png" alt="commission">
        </button>
      </div>

    </div>


      <div class="detail-overlay" id="detailOverlay">
        <div class="close-overlay" id="closeOverlay">✕</div>
        
        <div class="detail-content">
          <div class="detail-image">
            <img id="overlayImg" src="" alt="Drink">
          </div>
          
          <div class="detail-info">
            <div class="detail-title" id="overlayTitle">加载中...</div>
            <div class="detail-desc" id="overlayDesc">加载中...</div>
            <a href="#" class="detail-action-btn" id="overlayBtn">ENTER</a>
          </div>
        </div>
      </div>

    </div> 
  </div>

  <div id="footer-placeholder"></div>
  <script src="../../js/footer.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('detailOverlay');
      const closeBtn = document.getElementById('closeOverlay');
      const overlayImg = document.getElementById('overlayImg');
      const overlayTitle = document.getElementById('overlayTitle');
      const overlayDesc = document.getElementById('overlayDesc');
      const overlayBtn = document.getElementById('overlayBtn');

      // 用来按 id 快速索引 JSON 数据
      let drinksData = {};

      // JSON 文件路径
      const jsonPath = '../../json/drinks.json'; 

      // 1. 获取 JSON 数据（数组），并转成以 id 为键的对象
      fetch(jsonPath)
        .then(response => response.json())
        .then(list => {
          // list 是一个数组，需要转成 { id: item } 的形式
          drinksData = {};
          list.forEach(item => {
            if (item.id) {
              drinksData[item.id] = item;
            }
          });
        })
        .catch(error => {
          console.error("无法加载酒单数据，请检查 JSON 路径:", error);
        });

      // 2. 为所有酒瓶绑定点击事件
      const bottles = document.querySelectorAll('.bottle-btn');
      bottles.forEach(bottle => {
        bottle.addEventListener('click', function() {
          const charId = this.getAttribute('data-id');
          const data = drinksData[charId];

          if (data) {
            // 将 JSON 里的数据填入遮罩层
            overlayImg.src = data.image;
            overlayTitle.innerText = data.label;
            overlayDesc.innerText = data.subtitle;
            overlayBtn.href = data.link; // 这里就是按钮跳转对应页面的路径

            // 激活遮罩层，触发 CSS 动画
            overlay.classList.add('active');
          } else {
            console.log("未找到对应角色的数据: " + charId);
          }
        });
      });

      // 3. 关闭逻辑：点击 X 或点击灰色背景外侧关闭
      closeBtn.addEventListener('click', () => {
        overlay.classList.remove('active');
      });
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.classList.remove('active');
        }
      });
    });
  </script>

</body>
</html>
